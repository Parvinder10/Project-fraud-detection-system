version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fraud_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../reports:/app/reports
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    environment:
      - APP_ENV=production
      - MLFLOW_TRACKING_URI=./mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Streamlit Dashboard ───────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fraud_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ../models:/app/models
      - ../reports:/app/reports
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    environment:
      - APP_ENV=production
    depends_on:
      - api
    restart: unless-stopped

  # ── MLflow Tracking Server ────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: fraud_mlflow
    command: >-
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    restart: unless-stopped

networks:
  default:
    name: fraud_network
