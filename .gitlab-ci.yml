stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# ---- Lint -------------------------------------------------------
lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install flake8 black isort --quiet
  script:
    - black --check --diff .
    - isort --check-only .
    - flake8 . --max-line-length=120 --exclude=.venv,mlruns
  allow_failure: true

# ---- Unit Tests -------------------------------------------------
test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends build-essential -qq
    - pip install -r requirements.txt --quiet
    - pip install pytest pytest-asyncio httpx --quiet
  script:
    - pytest tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      junit: reports/junit.xml
    paths:
      - reports/
    expire_in: 1 week
  allow_failure: true

# ---- Build Docker Image -----------------------------------------
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f docker/Dockerfile -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker build -f docker/Dockerfile -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - fraud-detection-system

# ---- Deploy (example: SSH deploy) -------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "cd /opt/fraud-detection && docker-compose pull && docker-compose up -d"
  environment:
    name: production
    url: http://$DEPLOY_HOST:8501
  only:
    - main
  when: manual
