[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"

[tool.black]
line-length = 120
target-version = ["py311"]
exclude = '''
/(
    .venv
  | mlruns
  | .git
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = [".venv", "mlruns"]

[tool.flake8]
max-line-length = 120
exclude = [".venv", "mlruns", ".git"]
